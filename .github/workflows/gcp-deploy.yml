name: Deploy to GCP

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'infra/gcp/**'
      - '.github/workflows/gcp-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging

env:
  GCP_REGION: us-central1
  ENVIRONMENT: ${{ github.event.inputs.environment || 'prod' }}

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test:run

  build-cloudrun:
    name: Build and Push Docker Image
    if: ${{ false }}
    runs-on: ubuntu-latest
    needs: [test-backend]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        working-directory: backend
        run: |
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/pulsechecks-api"
          docker build \
            -f Dockerfile.cloudrun \
            -t "${IMAGE}:${{ github.sha }}" \
            -t "${IMAGE}:latest" \
            --platform linux/amd64 \
            .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

  deploy-infrastructure:
    name: Deploy GCP Infrastructure
    if: ${{ false }}
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        working-directory: infra/gcp
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/gcp
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: infra/gcp
        run: terraform apply -auto-approve tfplan

  deploy-cloudrun:
    name: Deploy Cloud Run Service
    if: ${{ false }}
    runs-on: ubuntu-latest
    needs: [build-cloudrun, deploy-infrastructure]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy pulsechecks-api-${{ env.ENVIRONMENT }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/pulsechecks-api:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --quiet

      - name: Get Cloud Run URL
        id: get-url
        run: |
          URL=$(gcloud run services describe pulsechecks-api-${{ env.ENVIRONMENT }} \
            --region ${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "cloudrun_url=$URL" >> $GITHUB_OUTPUT

      - name: Cloud Run deployment summary
        run: |
          echo "**Cloud Run URL:** ${{ steps.get-url.outputs.cloudrun_url }}" >> $GITHUB_STEP_SUMMARY

  deploy-firestore:
    name: Deploy Firestore Indexes
    if: ${{ false }}
    runs-on: ubuntu-latest
    needs: [deploy-infrastructure]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore indexes and rules
        working-directory: backend
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy \
            --only firestore:indexes,firestore:rules \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --token "${FIREBASE_TOKEN}"

  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    if: ${{ false }}
    runs-on: ubuntu-latest
    needs: [test-frontend, deploy-cloudrun]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for GCP
        working-directory: frontend
        run: npm run build:gcp
        env:
          VITE_CLOUD_PROVIDER: gcp
          VITE_API_URL: ${{ secrets.GCP_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        working-directory: frontend
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy \
            --only hosting \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --token "${FIREBASE_TOKEN}"

      - name: Get Firebase Hosting URL
        id: get-url
        run: |
          URL="https://${{ secrets.GCP_PROJECT_ID }}.web.app"
          echo "hosting_url=$URL" >> $GITHUB_OUTPUT

      - name: Deployment summary
        run: |
          echo "## Deployment Complete! 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend URL:** ${{ steps.get-url.outputs.hosting_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.GCP_REGION }}" >> $GITHUB_STEP_SUMMARY
