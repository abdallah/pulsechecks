# Force deployment trigger - Lambda and infra changes (2025-12-31-15:39)
stages:
  - test
  - build
  - deploy
  - publish-provider

variables:
  # Deployment target: "aws" or "gcp" (set via CI/CD variable)
  DEPLOY_TARGET: "aws"

  # AWS configuration
  AWS_PROFILE: testing
  AWS_REGION: us-east-1

  # GCP configuration (set these via CI/CD variables)
  # GCP_PROJECT_ID: your-project-id
  # GCP_REGION: us-central1
  # GCP_SERVICE_ACCOUNT_KEY: base64-encoded service account JSON
  # FIREBASE_TOKEN: firebase deployment token

  # Common
  ENVIRONMENT: prod

default:
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  image: python:3.13
  before_script:
    - apk add --no-cache aws-cli
    - echo "$GITLAB_OIDC_TOKEN" > /tmp/web_identity_token
    - mkdir -p ~/.aws
    - cp "$AWS_CONFIG_FILE" ~/.aws/config

# ============================================
# TERRAFORM PROVIDER PUBLISHING
# ============================================

build:terraform-provider:
  stage: publish-provider
  image: golang:1.24
  variables:
    PROVIDER_NAME: terraform-provider-pulsechecks
    PROVIDER_VERSION: "1.0.2"
  before_script:
    - apt-get update && apt-get install -y zip curl
  script:
    - cd terraform-provider
    - go mod tidy
    - go build -o ${PROVIDER_NAME}_v${PROVIDER_VERSION}
    - zip ${PROVIDER_NAME}_${PROVIDER_VERSION}_linux_amd64.zip ${PROVIDER_NAME}_v${PROVIDER_VERSION}
    - sha256sum ${PROVIDER_NAME}_${PROVIDER_VERSION}_linux_amd64.zip > ${PROVIDER_NAME}_${PROVIDER_VERSION}_SHA256SUMS
    - echo "✅ Terraform provider built successfully"
    # Publish to GitLab Package Registry
    - |
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file ${PROVIDER_NAME}_${PROVIDER_VERSION}_linux_amd64.zip \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/pulsechecks/terraform-provider-pulsechecks/${PROVIDER_VERSION}/file"
    - |
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file ${PROVIDER_NAME}_${PROVIDER_VERSION}_SHA256SUMS \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/pulsechecks/terraform-provider-pulsechecks/${PROVIDER_VERSION}/file"
    - echo "✅ Terraform provider published to GitLab registry"
  artifacts:
    paths:
      - terraform-provider/${PROVIDER_NAME}_${PROVIDER_VERSION}_linux_amd64.zip
      - terraform-provider/${PROVIDER_NAME}_${PROVIDER_VERSION}_SHA256SUMS
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

# ============================================
# TEST STAGE
# ============================================

test:backend:
  stage: test
  image: python:3.13
  script:
    - cd backend
    - python3.13 -m venv test_venv
    - source test_venv/bin/activate
    - pip install -r requirements.txt pytest pytest-asyncio
    - python -m pytest tests/ -v --tb=short
    - deactivate
    - rm -rf test_venv
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      changes:
        - backend/**/*
        - .gitlab-ci.yml

test:frontend:
  stage: test
  image: node:24
  before_script:
    - cd frontend
  script:
    - npm ci --silent
    - npm run test:run
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      changes:
        - frontend/**/*
        - .gitlab-ci.yml

# ============================================
# BUILD STAGE
# ============================================

build:lambda:
  stage: build
  image: python:3.13
  script:
    - apt update && apt install zip
    - cd backend
    - ./build_package.sh
  artifacts:
    paths:
      - backend/lambda.zip
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      changes:
        - backend/app/**/*
        - backend/requirements.txt
        - backend/build_package.sh
        - .gitlab-ci.yml

build:frontend:
  stage: build
  image: node:24
  before_script:
    - cd frontend
  script:
    - npm ci --silent
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      changes:
        - frontend/**/*
        - .gitlab-ci.yml

# ============================================
# DEPLOY STAGE
# ============================================

deploy:infrastructure:
  stage: deploy
  variables:
    TF_STATE_NAME: pulsechecks-testing
    TF_ROOT: "$CI_PROJECT_DIR/infra/aws"
  script:
    - echo "AWS_PROFILE is $AWS_PROFILE $(aws sts get-caller-identity)"
    - cd infra/aws
    - cp $TERRAFORM_TFVARS deploy.auto.tfvars
    - gitlab-terraform init
    - gitlab-terraform plan
    - gitlab-terraform apply
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH && $DEPLOY_TARGET == "aws"
      changes:
        - infra/aws/**/*
        - .gitlab-ci.yml

deploy:lambda:
  stage: deploy
  image: hashicorp/terraform:latest
  variables:
    TF_STATE_NAME: pulsechecks-testing
    TF_ROOT: "$CI_PROJECT_DIR/infra/aws"
  needs:
    - job: deploy:infrastructure
      optional: true
    - job: build:lambda
      artifacts: true
  script:
    - |
      # Get function names from Terraform
      cd infra/aws
      cp $TERRAFORM_TFVARS deploy.auto.tfvars
      gitlab-terraform init
      API_FUNCTION=$(gitlab-terraform output -raw api_function_name 2>/dev/null || echo "pulsechecks-api-${ENVIRONMENT}")
      PING_FUNCTION=$(gitlab-terraform output -raw ping_function_name 2>/dev/null || echo "pulsechecks-ping-${ENVIRONMENT}")
      DETECTOR_FUNCTION=$(gitlab-terraform output -raw late_detector_function_name 2>/dev/null || echo "pulsechecks-late-detector-${ENVIRONMENT}")
      cd ../../backend

      # Deploy using pre-built lambda.zip
      echo "Deploying to Lambda functions..."
      aws --version
      aws lambda update-function-code --function-name $API_FUNCTION --zip-file fileb://lambda.zip
      aws lambda update-function-code --function-name $PING_FUNCTION --zip-file fileb://lambda.zip
      aws lambda update-function-code --function-name $DETECTOR_FUNCTION --zip-file fileb://lambda.zip

      echo "✅ Lambda functions updated"
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH && $DEPLOY_TARGET == "aws"
      changes:
        - backend/app/**/*
        - backend/requirements.txt
        - backend/build_package.sh
        - .gitlab-ci.yml

deploy:frontend:
  stage: deploy
  image: hashicorp/terraform:latest
  variables:
    TF_STATE_NAME: pulsechecks-testing
    TF_ROOT: "$CI_PROJECT_DIR/infra/aws"
  needs:
    - job: deploy:infrastructure
      optional: true
    - job: build:frontend
      artifacts: true
  script:
    - cd infra/aws
    - cp $TERRAFORM_TFVARS deploy.auto.tfvars
    - gitlab-terraform init
    - S3_BUCKET=$(gitlab-terraform output -raw s3_bucket_name)
    - CLOUDFRONT_ID=$(gitlab-terraform output -raw cloudfront_distribution_id)
    - cd ../../frontend
    - aws s3 sync dist/ s3://${S3_BUCKET}/ --delete --quiet
    - aws cloudfront create-invalidation --distribution-id ${CLOUDFRONT_ID} --paths "/*"
    - echo "✅ Frontend deployed"
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH && $DEPLOY_TARGET == "aws"
      changes:
        - frontend/**/*
        - .gitlab-ci.yml

# ============================================
# GCP DEPLOYMENT
# ============================================

build:cloudrun:
  stage: build
  image: google/cloud-sdk:latest
  before_script:
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
    - gcloud auth configure-docker --quiet
  script:
    - cd backend
    - |
      docker build \
        -f Dockerfile.cloudrun \
        -t gcr.io/${GCP_PROJECT_ID}/pulsechecks-api:${CI_COMMIT_SHORT_SHA} \
        -t gcr.io/${GCP_PROJECT_ID}/pulsechecks-api:latest \
        --platform linux/amd64 \
        .
    - docker push gcr.io/${GCP_PROJECT_ID}/pulsechecks-api:${CI_COMMIT_SHORT_SHA}
    - docker push gcr.io/${GCP_PROJECT_ID}/pulsechecks-api:latest
    - echo "✅ Docker image pushed to GCR"
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH && $DEPLOY_TARGET == "gcp"
      changes:
        - backend/**/*
        - .gitlab-ci.yml

deploy:gcp:infrastructure:
  stage: deploy
  image: hashicorp/terraform:latest
  before_script:
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > /tmp/gcp-key.json
    - export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json
  variables:
    TF_ROOT: "$CI_PROJECT_DIR/infra/gcp"
  script:
    - cd infra/gcp
    - terraform init
    - terraform plan -out=tfplan
    - terraform apply -auto-approve tfplan
    - echo "✅ GCP infrastructure deployed"
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH && $DEPLOY_TARGET == "gcp"
      changes:
        - infra/gcp/**/*
        - .gitlab-ci.yml

deploy:gcp:cloudrun:
  stage: deploy
  image: google/cloud-sdk:latest
  needs:
    - job: build:cloudrun
      optional: false
    - job: deploy:gcp:infrastructure
      optional: true
  before_script:
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - gcloud config set project $GCP_PROJECT_ID
  script:
    - |
      gcloud run deploy pulsechecks-api-${ENVIRONMENT} \
        --image gcr.io/${GCP_PROJECT_ID}/pulsechecks-api:${CI_COMMIT_SHORT_SHA} \
        --region ${GCP_REGION:-us-central1} \
        --platform managed \
        --quiet
    - echo "✅ Cloud Run service deployed"
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH && $DEPLOY_TARGET == "gcp"
      changes:
        - backend/**/*
        - infra/gcp/**/*
        - .gitlab-ci.yml

deploy:gcp:firestore:
  stage: deploy
  image: node:24
  needs:
    - job: deploy:gcp:infrastructure
      optional: true
  before_script:
    - npm install -g firebase-tools
  script:
    - cd backend
    - firebase deploy --only firestore:indexes,firestore:rules --project ${GCP_PROJECT_ID} --token ${FIREBASE_TOKEN}
    - echo "✅ Firestore indexes and rules deployed"
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH && $DEPLOY_TARGET == "gcp"
      changes:
        - backend/firestore.indexes.json
        - backend/firestore.rules
        - .gitlab-ci.yml

deploy:gcp:frontend:
  stage: deploy
  image: node:24
  needs:
    - job: deploy:gcp:cloudrun
      optional: true
  before_script:
    - npm install -g firebase-tools
    - cd frontend
  script:
    - npm ci --silent
    - VITE_CLOUD_PROVIDER=gcp npm run build
    - firebase deploy --only hosting --project ${GCP_PROJECT_ID} --token ${FIREBASE_TOKEN}
    - echo "✅ Frontend deployed to Firebase Hosting"
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH && $DEPLOY_TARGET == "gcp"
      changes:
        - frontend/**/*
        - .gitlab-ci.yml
