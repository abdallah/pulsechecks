stages:
  - build
  - publish

variables:
  PROVIDER_NAME: terraform-provider-pulsechecks
  PROVIDER_VERSION: "1.0.0"

build:provider:
  stage: build
  image: golang:1.21
  script:
    - cd terraform-provider
    - go mod tidy
    - go build -o ${PROVIDER_NAME}_v${PROVIDER_VERSION}
    - zip ${PROVIDER_NAME}_${PROVIDER_VERSION}_linux_amd64.zip ${PROVIDER_NAME}_v${PROVIDER_VERSION}
    - sha256sum ${PROVIDER_NAME}_${PROVIDER_VERSION}_linux_amd64.zip > ${PROVIDER_NAME}_${PROVIDER_VERSION}_SHA256SUMS
  artifacts:
    paths:
      - terraform-provider/${PROVIDER_NAME}_${PROVIDER_VERSION}_linux_amd64.zip
      - terraform-provider/${PROVIDER_NAME}_${PROVIDER_VERSION}_SHA256SUMS
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

publish:provider:
  stage: publish
  image: curlimages/curl:latest
  needs:
    - build:provider
  script:
    - cd terraform-provider
    - |
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file ${PROVIDER_NAME}_${PROVIDER_VERSION}_linux_amd64.zip \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/pulsechecks/terraform-provider-pulsechecks/${PROVIDER_VERSION}/file"
    - |
      curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
           --upload-file ${PROVIDER_NAME}_${PROVIDER_VERSION}_SHA256SUMS \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/pulsechecks/terraform-provider-pulsechecks/${PROVIDER_VERSION}/file"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
